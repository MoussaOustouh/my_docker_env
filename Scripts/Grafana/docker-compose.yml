version: '3.8'
services:
  grafana:
    image: grafana/grafana:latest
    container_name: ${GRAFANA_CONTAINER_NAME}
    networks:
      - grafananet
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ${GRAFANA_DATA_VOLUME}:/var/lib/grafana
    ports:
      - "13000:3000"

networks:
  grafananet:
    driver: bridge